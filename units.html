<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #FF6B1A; --orange-pale: #FFF0E6; --orange-deep: #E85500;
  --off-white: #FAFAF8; --ink: #1A1208; --ink-muted: #6B5C45; --border: #F0E8DE;
}
html,body { overflow-x:hidden; max-width:100%; width:100%;
  font-family:'DM Sans',sans-serif; background:var(--off-white); color:var(--ink); min-height:100vh; }

.page-header {
  background: linear-gradient(135deg, var(--orange-pale) 0%, #fff8f3 100%);
  border-bottom: 1px solid var(--border); padding: 3rem 5% 2.5rem;
}
.page-header h1 {
  font-family:'Fraunces',serif;
  font-size: clamp(1.8rem,4vw,2.8rem);
  font-weight:900; letter-spacing:-0.02em; color:var(--ink);
}
.page-header p { margin-top:0.5rem; color:var(--ink-muted); font-size:0.95rem; }

/* summary bar */
.summary-bar {
  display:flex; gap:32px; padding:1.1rem 5%; background:#fff;
  border-bottom:1px solid var(--border); flex-wrap:wrap;
}
.sb-item { display:flex; flex-direction:column; gap:2px; }
.sb-num { font-family:'Fraunces',serif; font-size:1.5rem; font-weight:900; color:var(--orange); line-height:1; }
.sb-lbl { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-muted); }

/* subject tabs */
.subject-tabs {
  display:flex; gap:0; padding:0 5%;
  background:#fff; border-bottom:1px solid var(--border);
}
.tab-btn {
  font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:600;
  color:var(--ink-muted); background:none; border:none; border-bottom:3px solid transparent;
  padding:14px 20px; cursor:pointer; transition:all 0.15s;
}
.tab-btn:hover { color:var(--orange); }
.tab-btn.active { color:var(--orange); border-bottom-color:var(--orange); }

/* search */
.search-bar {
  padding:12px 5%; background:#fff; border-bottom:1px solid var(--border);
}
.search-bar input {
  font-family:'DM Sans',sans-serif; font-size:0.875rem;
  width:100%; max-width:400px; padding:9px 16px;
  border:1.5px solid var(--border); border-radius:100px;
  outline:none; background:#FAFAF8; color:var(--ink);
  transition:border-color 0.15s;
}
.search-bar input:focus { border-color:var(--orange); }

/* grid */
.units-grid {
  max-width:1100px; margin:0 auto;
  padding:1.5rem 5% 4rem;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:1rem;
}

.unit-card {
  background:#fff; border:1.5px solid var(--border); border-radius:16px;
  padding:1.4rem 1.5rem; text-decoration:none;
  display:flex; flex-direction:column; gap:0.3rem;
  transition:all 0.2s; position:relative; overflow:hidden;
}
.unit-card:hover {
  border-color:var(--orange); transform:translateY(-3px);
  box-shadow:0 6px 24px rgba(255,107,26,0.12);
  padding-right:2.4rem;
}
.unit-card::after {
  content:'→'; position:absolute; right:1.2rem; top:50%;
  transform:translateY(-50%) translateX(8px);
  opacity:0; color:var(--orange); font-size:1rem; font-weight:700;
  transition:all 0.2s;
}
.unit-card:hover::after { opacity:1; transform:translateY(-50%) translateX(0); }

.uc-subj {
  font-size:0.68rem; font-weight:700; text-transform:uppercase;
  letter-spacing:0.08em; padding:2px 8px; border-radius:100px;
  display:inline-block; margin-bottom:0.2rem; width:fit-content;
}
.s-bio  { background:#DCFCE7; color:#15803D; }
.s-chem { background:#DBEAFE; color:#1D4ED8; }
.s-phys { background:#FEF3C7; color:#B45309; }

.uc-name {
  font-family:'Fraunces',serif; font-size:1rem;
  font-weight:700; color:var(--ink); line-height:1.3; letter-spacing:-0.01em;
}
.uc-count { font-size:0.8rem; font-weight:500; color:var(--ink-muted); margin-top:2px; }

.uc-bar {
  height:3px; border-radius:2px; margin-top:8px;
  background:var(--border); overflow:hidden;
}
.uc-bar-fill { height:100%; border-radius:2px; transition:width 0.4s; }
.fill-bio  { background:#22C55E; }
.fill-chem { background:#2563EB; }
.fill-phys { background:#F59E0B; }

.hidden-card { display:none; }

.no-results {
  grid-column:1/-1; text-align:center; padding:60px 20px;
  color:var(--ink-muted); font-size:0.9rem;
}

@media (max-width:600px) {
  .units-grid { grid-template-columns:1fr; }
  .summary-bar { gap:20px; padding:1rem 5%; }
  .tab-btn { padding:12px 14px; font-size:0.82rem; }
}
</style>

// Max count for progress bar scaling
const MAX_N = Math.max(...CHAPTERS.map(c=>c.n));

const SCLS = { Biology:'s-bio', Chemistry:'s-chem', Physics:'s-phys' };
const FCLS = { Biology:'fill-bio', Chemistry:'fill-chem', Physics:'fill-phys' };

let activeTab = '';
let activeSearch = '';

function buildCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let visible = 0;
  CHAPTERS.forEach(ch => {
    const matchTab    = !activeTab   || ch.s === activeTab;
    const matchSearch = !activeSearch || ch.c.toLowerCase().includes(activeSearch) || ch.s.toLowerCase().includes(activeSearch);
    const show = matchTab && matchSearch;

    const a = document.createElement('a');
    a.className = 'unit-card' + (show ? '' : ' hidden-card');
    a.href = 'practice.html?subject=' + encodeURIComponent(ch.s) + '&chapter=' + encodeURIComponent(ch.c);

    const pct = Math.round((ch.n / MAX_N) * 100);
    a.innerHTML = `
      <span class="uc-subj ${SCLS[ch.s]||''}">${ch.s}</span>
      <div class="uc-name">${ch.c}</div>
      <div class="uc-count">${ch.n.toLocaleString()} question${ch.n!==1?'s':''}</div>
      <div class="uc-bar"><div class="uc-bar-fill ${FCLS[ch.s]||''}" style="width:${pct}%"></div></div>
    `;
    grid.appendChild(a);
    if (show) visible++;
  });

  if (visible === 0) {
    const d = document.createElement('div');
    d.className = 'no-results';
    d.textContent = 'No chapters found. Try a different search.';
    grid.appendChild(d);
  }
}

function setTab(subj) {
  activeTab = subj;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('search').value = '';
  activeSearch = '';
  buildCards();
}

function doSearch(val) {
  activeSearch = val.trim().toLowerCase();
  buildCards();
}

function toggleNav() { document.getElementById('mob-nav').classList.toggle('open'); }
document.addEventListener('click', function(e) {
  var m=document.getElementById('mob-nav'),b=document.querySelector('.nav-hamburger');
  if(m&&m.classList.contains('open')&&!m.contains(e.target)&&b&&!b.contains(e.target)) m.classList.remove('open');
});

// Initial render
buildCards();

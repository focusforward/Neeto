<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>neetminds Practice – Live Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --c-brand:#CC3300;--c-brand-mid:#FF6B1A;--c-brand-pale:#FFF0E6;
  --c-ink:#1A1208;--c-ink-muted:#6B5C45;
  --c-bg:#FFFDF9;--c-surface:#fff;--c-surface-2:#FFF8F3;
  --c-border:#F0E8DE;--c-border-sys:#E2E8F0;
  --c-success:#16A34A;--c-success-bg:#DCFCE7;--c-success-bdr:#16A34A;
  --c-error:#B91C1C;--c-error-bg:#FEE2E2;--c-error-bdr:#EF4444;
  --opt-bg:#fff;--opt-border:#E2E8F0;
  --opt-hover-bg:#EFF6FF;--opt-hover-bdr:#2563EB;--opt-hover-clr:#1D4ED8;
}
[data-theme="dark"]{
  --c-ink:#F5EDE0;--c-ink-muted:#C8B89A;
  --c-bg:#0F0A04;--c-surface:#1A1005;--c-surface-2:#201408;
  --c-border:rgba(255,107,26,0.15);--c-border-sys:rgba(255,255,255,0.10);
  --c-success-bg:rgba(22,163,74,0.2);--c-success-bdr:#22C55E;--c-success:#4ADE80;
  --c-error-bg:rgba(220,38,38,0.2);--c-error-bdr:#EF4444;--c-error:#F87171;
  --opt-bg:#201408;--opt-border:rgba(255,255,255,0.1);
  --opt-hover-bg:rgba(37,99,235,0.15);--opt-hover-bdr:#60A5FA;--opt-hover-clr:#93C5FD;
}
body{font-family:'DM Sans',sans-serif;background:var(--c-bg);color:var(--c-ink);transition:background .3s,color .3s;min-height:100vh;}

/* NAV */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:60px;background:var(--c-surface);
  border-bottom:1.5px solid var(--c-border);position:sticky;top:0;z-index:99;
  transition:background .3s,border-color .3s;
}
.nav-brand{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:900;letter-spacing:-0.04em;text-decoration:none;}
.brand-neet{color:#CC3300;}.brand-minds{color:#FF6B1A;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-link{font-size:0.84rem;font-weight:500;color:var(--c-ink-muted);text-decoration:none;}
.nav-link.active{color:#FF6B1A;font-weight:700;}
.theme-btn{
  width:34px;height:34px;border-radius:8px;border:1.5px solid var(--c-border);
  background:var(--c-surface-2);cursor:pointer;font-size:0.95rem;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.theme-btn:hover{border-color:#FF6B1A;transform:scale(1.08);}

/* PAGE HEADER */
.page-header{
  background:linear-gradient(135deg,var(--c-surface-2) 0%,var(--c-surface) 100%);
  border-bottom:1.5px solid var(--c-border);
  padding:1.6rem 24px 1.2rem;
  transition:background .3s,border-color .3s;
}
.page-header h1{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:900;letter-spacing:-0.02em;color:var(--c-ink);}
.page-header p{margin-top:4px;color:var(--c-ink-muted);font-size:0.87rem;}

/* REC CARD */
.rec-bar{
  padding:10px 24px;background:var(--c-surface);
  border-bottom:1.5px solid var(--c-border);
  display:flex;align-items:center;gap:8px;
  transition:background .3s;
}
.rec-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(204,51,0,0.1);border:1px solid rgba(204,51,0,0.2);
  border-radius:100px;padding:3px 10px;
  font-size:0.7rem;font-weight:800;color:#CC3300;
  text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;
}
.dot{width:5px;height:5px;border-radius:50%;background:#CC3300;display:inline-block;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
.rec-text{font-size:0.85rem;color:var(--c-ink-muted);}
.rec-text strong{color:var(--c-ink);}

/* PILLS */
.pills{
  display:flex;flex-wrap:wrap;gap:6px;padding:10px 24px;
  background:var(--c-surface-2);border-bottom:1.5px solid var(--c-border);
  transition:background .3s;
}
.pills label{font-size:0.72rem;font-weight:700;color:var(--c-ink-muted);text-transform:uppercase;letter-spacing:.06em;margin-right:4px;align-self:center;}
.pill{
  font-size:0.75rem;font-weight:700;padding:5px 13px;border-radius:100px;
  border:1.5px solid var(--c-border);background:var(--c-surface);
  color:var(--c-ink-muted);cursor:pointer;transition:all .15s;white-space:nowrap;
}
.pill:hover{border-color:#FF6B1A;color:#FF6B1A;}
.pill.active{background:#CC3300;color:#fff;border-color:#CC3300;}

/* Q COUNT */
.q-count{padding:9px 24px;font-size:0.8rem;color:var(--c-ink-muted);font-weight:500;background:var(--c-surface);border-bottom:1.5px solid var(--c-border);transition:background .3s;}

/* QUESTION AREA */
.q-area{max-width:700px;margin:0 auto;padding:24px 24px 80px;}

/* PROGRESS */
.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:1.4rem;}
.prog-bar{flex:1;height:5px;background:var(--c-border);border-radius:100px;overflow:hidden;}
.prog-fill{height:100%;background:#FF6B1A;border-radius:100px;transition:width .3s;}
.prog-label{font-size:0.8rem;font-weight:600;color:var(--c-ink-muted);white-space:nowrap;}

/* QUESTION CARD */
.q-card{
  background:var(--c-surface);border:1.5px solid var(--c-border);
  border-radius:18px;padding:1.8rem 2rem;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
  transition:background .3s,border-color .3s;
}
.q-tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.tag{display:inline-block;font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:.04em;}
.tag-phys{background:#FEF3C7;color:#B45309;}
.tag-bio{background:#DCFCE7;color:#15803D;}
.tag-chem{background:#DBEAFE;color:#1D4ED8;}
.tag-diff-l1{background:#DCFCE7;color:#15803D;}
.tag-diff-l2{background:#FEF3C7;color:#B45309;}
.tag-diff-l3{background:#FEE2E2;color:#B91C1C;}
.tag-pattern{background:#FFF0E6;color:#E85500;}
.q-meta{font-size:0.72rem;font-weight:600;color:var(--c-ink-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.q-text{font-size:1rem;font-weight:500;line-height:1.7;color:var(--c-ink);margin-bottom:1.2rem;}

/* DIAGRAM */
.diag-wrap{margin:0 0 1.2rem;text-align:center;}
.diag-img{
  max-width:100%;max-height:320px;object-fit:contain;
  border-radius:10px;border:1.5px solid var(--c-border);
  background:var(--c-surface);padding:10px;display:block;margin:0 auto;
  transition:border-color .3s,background .3s;
}
[data-theme="dark"] .diag-img{filter:brightness(.92) contrast(1.05);}
.diag-placeholder{
  display:flex;align-items:center;gap:10px;
  background:var(--c-surface-2);border:1.5px dashed var(--c-border);
  border-radius:10px;padding:14px 16px;margin:0 0 1.2rem;
  transition:background .3s;
}
.diag-placeholder-icon{font-size:1.4rem;flex-shrink:0;}
.diag-placeholder-title{font-size:0.78rem;font-weight:700;color:#CC3300;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.diag-placeholder-text{font-size:0.76rem;color:var(--c-ink-muted);line-height:1.5;}

/* OPTIONS */
.opt{
  display:flex;align-items:center;gap:10px;
  background:var(--opt-bg);border:1.5px solid var(--opt-border);
  border-radius:10px;padding:0.7rem 1rem;width:100%;text-align:left;
  font-size:0.93rem;font-family:inherit;cursor:pointer;
  color:var(--c-ink);transition:all .15s;margin-bottom:8px;
}
.opt:not(.correct):not(.wrong):not(.dim):hover{
  background:var(--opt-hover-bg);border-color:var(--opt-hover-bdr);color:var(--opt-hover-clr);
}
.opt-label{font-weight:700;color:#FF6B1A;min-width:1.1rem;flex-shrink:0;}
.opt.correct{
  background:var(--c-success-bg)!important;
  border:2px solid var(--c-success-bdr)!important;
  color:var(--c-success)!important;
  font-weight:700;pointer-events:none;
}
.opt.wrong{
  background:var(--c-error-bg)!important;
  border:2px solid var(--c-error-bdr)!important;
  color:var(--c-error)!important;
  pointer-events:none;
}
.opt.dim{opacity:.33;pointer-events:none;}
.opt .check{margin-left:auto;font-size:1.1rem;display:none;}
.opt.correct .check{display:block;}

/* EXPLANATION */
.expl{
  background:var(--c-surface-2);border:1px solid rgba(255,107,26,.2);
  border-radius:12px;padding:1rem 1.2rem;margin-top:1rem;
  font-size:0.875rem;color:var(--c-ink);line-height:1.65;
  transition:background .3s;
}
.expl-label{font-size:0.76rem;font-weight:700;color:#E85500;margin-bottom:6px;}

/* NAV ROW */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.4rem;gap:10px;}
.btn-prev{
  background:none;border:1.5px solid var(--c-border);border-radius:100px;
  padding:0.5rem 1.2rem;font-size:0.875rem;font-weight:600;
  color:var(--c-ink-muted);cursor:pointer;font-family:inherit;transition:all .15s;
}
.btn-prev:hover{border-color:#FF6B1A;color:#FF6B1A;}
.btn-next{
  background:#FF6B1A;border:none;border-radius:100px;
  padding:0.6rem 1.6rem;font-size:0.875rem;font-weight:700;
  color:#fff;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 14px rgba(255,107,26,.3);transition:all .15s;
}
.btn-next:hover{background:#E85500;transform:translateY(-1px);}
.btn-next.success{background:#16A34A;box-shadow:0 4px 14px rgba(22,163,74,.3);}
.show-ans{
  background:none;border:1.5px solid var(--c-border);border-radius:100px;
  padding:0.38rem 1rem;font-size:0.8rem;font-weight:600;color:var(--c-ink-muted);
  cursor:pointer;font-family:inherit;transition:all .15s;margin-top:.8rem;
}
.show-ans:hover{border-color:#FF6B1A;color:#FF6B1A;}

/* DEMO CONTROLS */
.demo-controls{
  background:var(--c-surface);border-top:1.5px solid var(--c-border);
  padding:12px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  position:sticky;bottom:0;z-index:99;transition:background .3s;
}
.demo-label{font-size:0.78rem;font-weight:700;color:var(--c-ink-muted);text-transform:uppercase;letter-spacing:.06em;}
.demo-btn{
  font-size:0.8rem;font-weight:600;padding:6px 14px;border-radius:100px;
  border:1.5px solid var(--c-border);background:var(--c-surface);
  color:var(--c-ink-muted);cursor:pointer;transition:all .15s;
}
.demo-btn:hover,.demo-btn.active{background:#CC3300;color:#fff;border-color:#CC3300;}
</style>
</head>

var currentQ = 0;
var total = 69;

function selectPill(btn) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
}

function getTagClass(subject) {
  if (subject === 'Biology') return 'tag-bio';
  if (subject === 'Chemistry') return 'tag-chem';
  return 'tag-phys';
}
function getDiffClass(d) { return d==='L1'?'tag-diff-l1':d==='L2'?'tag-diff-l2':'tag-diff-l3'; }

function renderQ(q, qNum, totalQ) {
  var area = document.getElementById('q-area');
  var pct = Math.round((qNum/totalQ)*100);

  // Build options
  var optsHtml = '';
  var keys = ['A','B','C','D'];
  keys.forEach(function(k) {
    if (!q.options[k]) return;
    var cls = 'opt';
    var check = '';
    if (q._answered) {
      if (k === q.correct) { cls += ' correct'; check = '<span class="check">✓</span>'; }
      else if (k === q.chosen) { cls += ' wrong'; }
      else { cls += ' dim'; }
    }
    optsHtml += '<button class="'+cls+'" onclick="answer(\'' + k + '\')">'+
      '<span class="opt-label">'+k+'.</span>'+
      esc(q.options[k]) + check + '</button>';
  });

  // Diagram block
  var diagHtml = '';
  if (q.pattern === 'diagram_dhamaka') {
    if (q.image_url) {
      diagHtml = '<div class="diag-wrap"><img class="diag-img" src="'+q.image_url+'" alt="Diagram" onerror="this.parentNode.style.display='none'"></div>';
    } else {
      diagHtml = '<div class="diag-placeholder">'+
        '<span class="diag-placeholder-icon">🖼️</span>'+
        '<div><div class="diag-placeholder-title">Figure referenced in question</div>'+
        '<div class="diag-placeholder-text">This question refers to a diagram. Refer to your NCERT book or past paper for the figure.</div></div></div>';
    }
  }

  // Explanation
  var explHtml = '';
  if (q._answered && q.explanation) {
    explHtml = '<div class="expl"><div class="expl-label">✅ Correct Answer: '+q.correct+'</div>'+esc(q.explanation)+'</div>';
  }
  var showAnsBtn = q._answered ? '' : '<button class="show-ans" onclick="revealAns()">Show Answer</button>';

  area.innerHTML =
    '<div class="progress-row">'+
      '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
      '<span class="prog-label">'+qNum+' / '+totalQ+'</span>'+
    '</div>'+
    '<div class="q-card">'+
      '<div class="q-tags">'+
        '<span class="tag '+getTagClass(q.subject)+'">'+q.subject+'</span>'+
        '<span class="tag '+getDiffClass(q.difficulty)+'">'+q.difficulty+'</span>'+
        '<span class="tag tag-pattern">'+q.pattern+'</span>'+
      '</div>'+
      '<div class="q-meta">'+esc(q.subject)+' · '+esc(q.chapter)+'</div>'+
      '<div class="q-text">'+esc(q.question)+'</div>'+
      diagHtml+
      optsHtml+
      showAnsBtn+
      explHtml+
      '<div class="nav-row">'+
        '<button class="btn-prev" '+(qNum<=1?'disabled style="opacity:.4"':'')+' onclick="prevQ()">← Prev</button>'+
        '<button class="btn-next '+(q._answered?'success':'') +'" onclick="nextQ()">'+
          (qNum>=totalQ ? 'Finished' : 'Next →')+'</button>'+
      '</div>'+
    '</div>';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function answer(key) {
  var q = QUESTIONS[currentQ];
  if (q._answered) return;
  q.chosen = key;
  q._answered = true;
  renderQ(q, currentQ+1, total);
}

function revealAns() {
  var q = QUESTIONS[currentQ];
  if (q._answered) return;
  q.chosen = ''; // show correct only
  q._answered = true;
  renderQ(q, currentQ+1, total);
}

function prevQ() { if(currentQ>0) loadQ(currentQ-1); }
function nextQ() { if(currentQ<QUESTIONS.length-1) loadQ(currentQ+1); }

function loadQ(idx) {
  currentQ = idx;
  // Reset answered state for demo questions 0-2
  if (idx < 3) QUESTIONS[idx]._answered = false;
  document.querySelectorAll('.demo-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderQ(QUESTIONS[idx], idx+1, total);
}

// ── THEME ───────────────────────────────────────────────────
function toggleTheme() {
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
}

// ── INIT ────────────────────────────────────────────────────
loadQ(0);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Practice — NEETO</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="logo">NEETO</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="practice.html" class="active">Practice</a>
    <a href="mock.html">Mock Test</a>
    <a href="units.html">Units</a>
  </div>
</nav>

<div class="page-header">
  <h1>Practice Questions</h1>
</div>

<div class="filters">
  <select id="filter-subject">
    <option value="">All Subjects</option>
    <option value="Biology">Biology</option>
    <option value="Chemistry">Chemistry</option>
    <option value="Physics">Physics</option>
  </select>

  <select id="filter-pattern">
    <option value="">All Patterns</option>
    <option value="DIRECT_HIT">Direct Hit</option>
    <option value="GOOGLY">Googly (EXCEPT/NOT)</option>
    <option value="SPEED_BREAKER">Speed Breaker</option>
    <option value="MAGIC_TRICK">Assertion-Reason</option>
    <option value="SILLY_SLIP">Silly Slip</option>
    <option value="OVER_SMART">Over Smart</option>
  </select>

  <select id="filter-diff">
    <option value="">All Levels</option>
    <option value="L1">L1 — Easy</option>
    <option value="L2">L2 — Medium</option>
    <option value="L3">L3 — Hard</option>
  </select>
</div>

<div class="question-count" id="q-count">Loading...</div>

<div class="questions-list" id="questions-container">
  <p style="color:#666; padding:40px; text-align:center;">Loading questions...</p>
</div>

<footer>
  <p>NEETO — Built for NEET aspirants</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Practice — NEETO</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="css/theme-override.css"/>
<style>
/* ---- YOUR ENTIRE ORIGINAL STYLE BLOCK REMAINS 100% UNCHANGED ---- */
</style>
</head>
<body>

<!-- ---- YOUR ENTIRE HTML BODY REMAINS UNCHANGED ---- -->

<script>
// ---- ALL YOUR SCRIPT ABOVE REMAINS UNCHANGED ----

// ── RENDER ────────────────────────────────────────────
function renderQuestions(qs) {
  var container = document.getElementById('questions-container');
  if (!container) return;
  if (!qs.length) {
    container.innerHTML = '<p style="color:#6B5C45;padding:40px;text-align:center;">No questions match your filters.</p>';
    return;
  }
  window._currentQs = qs;

  var tagBase = 'display:inline-block;font-size:0.72rem;font-weight:700;padding:0.25rem 0.7rem;border-radius:100px;border:none;margin-right:0.4rem;text-transform:uppercase;letter-spacing:0.04em;';
  var html = '';

  for (var i=0; i<qs.length; i++) {
    var q = qs[i];
    var subjBg  = q.subject==='Biology'?'#DCFCE7':q.subject==='Chemistry'?'#DBEAFE':'#FEF3C7';
    var subjCol = q.subject==='Biology'?'#15803D':q.subject==='Chemistry'?'#1D4ED8':'#B45309';
    var diffBg  = q.difficulty==='L1'?'#DCFCE7':q.difficulty==='L2'?'#FEF3C7':'#FEE2E2';
    var diffCol = q.difficulty==='L1'?'#15803D':q.difficulty==='L2'?'#B45309':'#B91C1C';

    var opts = '';
    var keys = ['A','B','C','D'];
    for (var ki=0; ki<4; ki++) {
      var k       = keys[ki];
      var optText = (q.options && q.options[k]) ? q.options[k] : '';

      /* 🔧 FIXED SECTION — ONLY CHANGE MADE */
      opts += '<button id="opt-' + i + '-' + k + '" class="neeto-opt"'
            + ' data-key="' + k + '" data-index="' + i + '"'
            + ' onclick="neetoSelect(' + i + ',\'' + k + '\')">'
            + '<span style="font-weight:700;color:#FF6B1A;margin-right:0.5rem;">' + k + '</span>'
            + optText + '</button>';
    }

    var ncert = (q.ncert_ref && q.ncert_ref !== 'undefined')
      ? '<div style="margin-top:0.5rem;font-size:0.8rem;color:#6B5C45;">&#x1F4D6; ' + q.ncert_ref + '</div>' : '';
    var yearTag = q.year ? '<span style="' + tagBase + 'background:#F3F4F6;color:#6B7280;">NEET ' + q.year + '</span>' : '';

    html += '<div class="question-card q-card" id="qc-' + i + '" style="background:#fff;border:1.5px solid #F0E8DE;border-radius:18px;padding:1.6rem 1.8rem;margin-bottom:1rem;">'
          + '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.9rem;">'
          + '<span style="' + tagBase + 'background:' + subjBg + ';color:' + subjCol + ';">' + (q.subject||'') + '</span>'
          + (q.pattern ? '<span style="' + tagBase + 'background:#FFF0E6;color:#E85500;">' + q.pattern + '</span>' : '')
          + (q.difficulty ? '<span style="' + tagBase + 'background:' + diffBg + ';color:' + diffCol + ';">' + q.difficulty + '</span>' : '')
          + yearTag + '</div>'
          + '<div style="font-size:0.97rem;line-height:1.65;color:#1A1208;margin-bottom:1rem;">' + q.question + '</div>'
          + opts
          + '<button class="neeto-show-btn" onclick="neetoReveal(' + i + ')" style="margin-top:0.6rem;background:none;border:1.5px solid #F0E8DE;border-radius:100px;padding:0.4rem 1rem;font-size:0.8rem;font-weight:600;color:#6B5C45;cursor:pointer;font-family:inherit;">Show Answer</button>'
          + '<div id="exp-' + i + '" style="display:none;"><strong style="color:#E85500;">Correct: ' + q.correct_answer + '</strong><br>' + (q.explanation||'') + ncert + '</div>'
          + '</div>';
  }
  container.innerHTML = html;
}

// ---- REST OF YOUR SCRIPT REMAINS 100% UNCHANGED ----
</script>
</body>
</html>
